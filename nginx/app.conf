# ================================================================
# Nginx Application Configuration — Blue-Green Deployment Proxy
# ================================================================
# File: /etc/nginx/conf.d/app.conf
#
# Blue-Green Deployment Strategy:
#
#   BLUE  = Port 8080 (currently active / stable version)
#   GREEN = Port 8081 (new version being deployed)
#
# The deployment script (scripts/deploy.sh) automatically:
#   1. Starts the new container on the inactive port
#   2. Performs a health check
#   3. If healthy → updates this file to point to the new port
#   4. Reloads nginx gracefully (zero downtime)
#   5. Stops the old container
#
# This file is managed by the deploy.sh script.
# The ACTIVE_PORT variable is replaced by sed during deployment.
# ================================================================

# ----------------------------------------------------------------
# Upstream Block — points to the currently active container
# ----------------------------------------------------------------
# NOTE: The deployment script rewrites the port dynamically.
# Default active port is 8080 (BLUE). After successful Green deployment
# this becomes 8081, and so on alternately.
upstream app_backend {
    # Active container port (managed by deploy.sh)
    server 127.0.0.1:8080;

    # Connection keep-alive to upstream (improves performance)
    keepalive 32;
}

# ----------------------------------------------------------------
# Server Block
# ----------------------------------------------------------------
server {
    listen 80;
    server_name _;  # Catch-all; replace with your domain in production

    # ---- Access and Error Logs ----
    access_log /var/log/nginx/app_access.log;
    error_log  /var/log/nginx/app_error.log warn;

    # ---- Health Check Endpoint (direct, no proxy) ----
    # Used by AWS ALB / load balancer to check Nginx itself
    location /nginx-health {
        access_log off;
        return 200 "nginx-ok\n";
        add_header Content-Type text/plain;
    }

    # ---- Proxy All Requests to Spring Boot Application ----
    location / {
        proxy_pass http://app_backend;

        # Pass real client IP and headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection reuse to upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts (generous — allows for GC pauses)
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    # ---- Security Headers ----
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;
}
