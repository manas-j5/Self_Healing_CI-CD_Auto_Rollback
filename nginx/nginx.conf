# ================================================================
# Nginx Main Configuration — Self-Healing CI/CD Deployment System
# ================================================================
# File: /etc/nginx/nginx.conf (copy or symlink from repo)
# ================================================================

user nginx;

# Set worker_processes to auto to match available CPU cores
worker_processes auto;

# Error log location and level
error_log /var/log/nginx/error.log warn;

# PID file
pid /var/run/nginx.pid;

# ----------------------------------------------------------------
# Events Block
# ----------------------------------------------------------------
events {
    # Max simultaneous connections per worker
    worker_connections 1024;

    # Accept all connections at once (more efficient under load)
    multi_accept on;
}

# ----------------------------------------------------------------
# HTTP Block
# ----------------------------------------------------------------
http {
    # MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging Format ----
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream="$upstream_addr" '
                    'response_time="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ---- Performance Optimizations ----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Keep-alive connections (reduces latency for repeated requests)
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ---- Compression (reduces bandwidth) ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ---- Security Headers ----
    server_tokens off;  # Hide nginx version from error pages

    # ---- Include virtual host configs ----
    include /etc/nginx/conf.d/*.conf;
}
