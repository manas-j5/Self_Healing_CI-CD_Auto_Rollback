<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CI/CD Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #38bdf8;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .status {
            font-size: 22px;
            font-weight: bold;
        }

        .green { color: #22c55e; }
        .red { color: #ef4444; }

        progress {
            width: 100%;
            height: 20px;
        }
    </style>
</head>

<body>

    <h1>🚀 CI/CD Pipeline Dashboard</h1>

    <div class="card">
        <h2>Status</h2>
        <p id="status" class="status">Loading...</p>
    </div>

    <div class="card">
        <h2>Version</h2>
        <p id="version">--</p>
    </div>

    <div class="card">
        <h2>Deployment Time</h2>
        <p id="time">--</p>
    </div>

    <div class="card">
        <h2>Health</h2>
        <progress id="healthBar" value="0" max="100"></progress>
    </div>

    <p>Last Updated: <span id="lastUpdated">--</span></p>
    <p>Auto-refresh every 5 seconds 🔄</p>

    <script src="script.js"></script>

</body>
</html>
