# ================================================================
# Self-Healing CI/CD Application - Spring Boot Configuration
# ================================================================

# ----------------------------------------------------------------
# Application Identity
# ----------------------------------------------------------------
spring.application.name=selfhealing-app

# App version + environment — injected via environment variables
# Set in Dockerfile or docker run via -e APP_VERSION=v1 -e APP_ENV=production
app.version=${APP_VERSION:local}
app.env=${APP_ENV:development}

# ----------------------------------------------------------------
# Server Configuration
# ----------------------------------------------------------------
server.port=${SERVER_PORT:8080}

# Graceful shutdown — waits for in-flight requests to finish
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ----------------------------------------------------------------
# Spring Actuator Configuration
# ----------------------------------------------------------------
# Expose all actuator endpoints over HTTP (health, info, metrics, etc.)
management.endpoints.web.exposure.include=health,info,metrics,env,loggers
management.endpoint.health.show-details=always

# Enable detailed health status (returns UP/DOWN with details)
management.health.defaults.enabled=true

# Actuator base path (default: /actuator)
management.endpoints.web.base-path=/actuator

# ----------------------------------------------------------------
# Logging Configuration
# ----------------------------------------------------------------
logging.level.root=INFO
logging.level.com.devops.selfhealing=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%-5level] %logger{36} - %msg%n
logging.file.name=/var/log/app/application.log

# ----------------------------------------------------------------
# Application Info (exposed at /actuator/info)
# ----------------------------------------------------------------
info.app.name=Self-Healing CI/CD Demo App
info.app.version=${APP_VERSION:local}
info.app.description=Blue-Green deployment with automatic rollback
